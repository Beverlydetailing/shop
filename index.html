<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beverly Detailing</title>
<style>
  /* === Global Styles === */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; color: #fff; }

  /* === Hero Section === */
  header {
    background: url('https://images.unsplash.com/photo-1571607384703-43de073e1c9d?auto=format&fit=crop&w=1470&q=80') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  }
  header h1 {
    font-size: 4rem;
    margin-bottom: 20px;
    color: #ff9800;
  }
  header p {
    font-size: 1.8rem;
    margin-bottom: 40px;
    color: #ffffff;
  }

  /* === Book Now Button === */
  button#bookNowBtn {
    background: #ff9800;
    color: white;
    border: none;
    padding: 15px 40px;
    font-size: 1.3rem;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }
  button#bookNowBtn:hover {
    background: #e68900;
  }

  /* === Footer === */
  footer {
    text-align: center;
    padding: 20px;
    background: #333;
    color: white;
  }
</style>
</head>
<body>

<header>
  <h1>Beverly Detailing</h1>
  <p>Professional Car Detailing & Premium Service</p>
  <button id="bookNowBtn">Book Now</button>
</header>

<footer>
  &copy; 2026 Beverly Detailing. All rights reserved.
</footer>

<script>
  const bookNowBtn = document.getElementById('bookNowBtn');
  bookNowBtn.addEventListener('click', () => {
    // Redirect directly to your Google Form
    window.location.href = 'https://docs.google.com/forms/d/1UfIUiCrnxfCLST8TEPVOUqGyqzCKV4B8mqCXlcXAuik/edit?pli=1';
  });
</script>

</body>
</html>
